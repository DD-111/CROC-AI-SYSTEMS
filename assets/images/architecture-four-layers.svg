<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Croc system layers">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="720" height="280" rx="16" fill="url(#bg)"/>
  <text x="360" y="34" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Croc Sentinel - three parts</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="40" y="70" width="200" height="170" rx="12" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
    <text x="140" y="105" text-anchor="middle" fill="#dbeafe" font-size="14" font-weight="700">Cloud</text>
    <text x="140" y="135" text-anchor="middle" fill="#bfdbfe" font-size="11">Online service</text>
    <text x="140" y="155" text-anchor="middle" fill="#bfdbfe" font-size="11">Live updates</text>
    <text x="140" y="175" text-anchor="middle" fill="#bfdbfe" font-size="11">Phone alerts</text>
    <text x="140" y="200" text-anchor="middle" fill="#93c5fd" font-size="11">Per-organisation access</text>

    <rect x="260" y="70" width="200" height="170" rx="12" fill="#7c2d12" stroke="#fb923c" stroke-width="2"/>
    <text x="360" y="105" text-anchor="middle" fill="#ffedd5" font-size="14" font-weight="700">Mobile app</text>
    <text x="360" y="135" text-anchor="middle" fill="#fed7aa" font-size="11">iPhone and Android</text>
    <text x="360" y="155" text-anchor="middle" fill="#fed7aa" font-size="11">Live map</text>
    <text x="360" y="175" text-anchor="middle" fill="#fed7aa" font-size="11">Event list</text>
    <text x="360" y="200" text-anchor="middle" fill="#fdba74" font-size="11">Arm / disarm all</text>

    <rect x="480" y="70" width="200" height="170" rx="12" fill="#581c87" stroke="#c084fc" stroke-width="2"/>
    <text x="580" y="105" text-anchor="middle" fill="#f3e8ff" font-size="14" font-weight="700">AI layer</text>
    <text x="580" y="135" text-anchor="middle" fill="#e9d5ff" font-size="11">Urgency score</text>
    <text x="580" y="155" text-anchor="middle" fill="#e9d5ff" font-size="11">Who to notify</text>
    <text x="580" y="175" text-anchor="middle" fill="#e9d5ff" font-size="11">Follow-up</text>
    <text x="580" y="200" text-anchor="middle" fill="#d8b4fe" font-size="11">Call if unanswered</text>
  </g>
  <text x="245" y="155" fill="#94a3b8" font-size="22">&gt;</text>
  <text x="465" y="155" fill="#94a3b8" font-size="22">&gt;</text>
  <text x="360" y="255" text-anchor="middle" fill="#cbd5e1" font-size="12">Event - cloud - notify - respond</text>
</svg>
